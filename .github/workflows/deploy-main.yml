name: Deploy Joaquim Lopes (production)

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-main.yml"
      - "assets/**"
      - "index.html"
      - "especialidade.html"
      - "pre-agendamento.html"
      - "sobre.html"
      - "robots.txt"
      - "sitemap.xml"
      - "vercel.json"
  workflow_dispatch:

concurrency:
  group: deploy-joaquim-lopes-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Joaquim Lopes to Vercel
    if: github.repository_owner == 'drjoaquimlopes'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          set -euo pipefail

          deploy_output="$(vercel deploy --prod --yes --archive=tgz --token=${{ secrets.VERCEL_TOKEN }})"
          echo "$deploy_output"

          deploy_url="$(printf '%s\n' "$deploy_output" | perl -pe 's/\e\[[0-9;]*[A-Za-z]//g' | tr -d '\r' | grep -Eo 'https://[^[:space:]]+' | tail -n 1 || true)"

          if [ -z "$deploy_url" ]; then
            echo "Falha ao extrair a URL do deploy da Vercel."
            exit 1
          fi

          echo "url=$deploy_url" >> "$GITHUB_OUTPUT"
          echo "Production URL: $deploy_url" >> "$GITHUB_STEP_SUMMARY"
